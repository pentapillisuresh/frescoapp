# Project-wide Gradle settings.

# Increase memory but safe for 8GB RAM
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8

# Disable parallel build (reduces RAM usage)
org.gradle.parallel=false

# AndroidX
android.useAndroidX=true

# Enable AAPT2 PNG crunching
android.enablePngCrunchInReleaseBuilds=true

# Build architectures
reactNativeArchitectures=armeabi-v7a,arm64-v8a

# Disable new architecture (saves memory)
newArchEnabled=true

# Enable Hermes (recommended)
hermesEnabled=true

# Edge to edge
edgeToEdgeEnabled=true

# Expo image support
expo.gif.enabled=true
expo.webp.enabled=true
expo.webp.animated=false

# Network inspector
EX_DEV_CLIENT_NETWORK_INSPECTOR=true

# Packaging
expo.useLegacyPackaging=false

expo.edgeToEdgeEnabled=true
